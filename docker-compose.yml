services:
  postgres:
    image: postgres:latest
    container_name: springlearning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: springlearning
      POSTGRES_USER: spring
      POSTGRES_PASSWORD: spring
    ports:
      - "5444:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:

